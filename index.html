<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>링키영어 학원관리 시스템</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root {
  --teal:#2EC4B6;--teal-dark:#22A89C;--teal-light:#e1f7f5;
  --pink:#FF6B9D;--pink-light:#fbeaf0;
  --yellow:#F2C94C;--yellow-light:#fef9e6;
  --warm:#F7F3EC;--mint:#B8EDE9;--charcoal:#3D3D3D;--gray:#888;
  --border:#e8e4dd;--white:#fff;
  --red:#E24B4A;--red-light:#fde8e8;
  --amber:#EF9F27;--amber-light:#faeeda;
  --green:#27AE60;--green-light:#e1f5ee;--kakao:#FAE100;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:var(--warm);color:var(--charcoal);}
.screen{display:none;}.screen.active{display:flex;}

/* LOGIN */
#screen-login{min-height:100vh;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--mint) 0%,var(--warm) 60%);}
.login-card{background:#fff;border-radius:20px;padding:40px 36px;width:340px;box-shadow:0 8px 32px rgba(46,196,182,.12);display:flex;flex-direction:column;gap:20px;}
.login-logo{text-align:center;}
.logo-big{font-size:28px;font-weight:900;color:var(--teal);}
.logo-big span{color:var(--pink);}
.logo-sub{font-size:12px;color:var(--gray);margin-top:4px;}
.login-label{font-size:13px;font-weight:500;margin-bottom:6px;}
.login-input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;font-size:15px;letter-spacing:4px;text-align:center;outline:none;transition:border .2s;}
.login-input:focus{border-color:var(--teal);}
.login-btn{width:100%;background:var(--teal);color:#fff;border:none;border-radius:10px;padding:12px;font-size:15px;font-weight:500;cursor:pointer;}
.login-btn:hover{background:var(--teal-dark);}
.login-error{color:var(--red);font-size:12px;text-align:center;display:none;}

/* ATTENDANCE */
#screen-attendance{min-height:100vh;flex-direction:column;background:var(--mint);}
.att-header{background:var(--teal);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.att-header-logo{font-size:20px;font-weight:700;color:#fff;}
.att-header-logo span{color:#FFE066;}
.att-header-info{text-align:right;color:rgba(255,255,255,.9);font-size:13px;line-height:1.6;}
.att-body{flex:1;display:flex;gap:20px;padding:20px 24px;max-width:900px;margin:0 auto;width:100%;}
.att-left{flex:1;display:flex;flex-direction:column;gap:14px;}
.att-class-badge{display:inline-flex;align-items:center;gap:6px;background:#fff;border-radius:30px;padding:6px 16px;font-size:13px;font-weight:500;color:#085041;align-self:flex-start;}
.att-code-card{background:#fff;border-radius:16px;padding:20px;display:flex;flex-direction:column;gap:12px;box-shadow:0 2px 12px rgba(0,0,0,.06);}
.att-code-title{font-size:14px;color:var(--gray);text-align:center;}
.att-code-display{background:#f5f5f5;border-radius:10px;height:56px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;letter-spacing:8px;color:var(--teal);border:2px dashed var(--teal);}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.num-btn{background:var(--warm);border-radius:10px;height:52px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:500;color:var(--charcoal);border:1px solid var(--border);cursor:pointer;transition:all .15s;user-select:none;}
.num-btn:hover{background:var(--mint);border-color:var(--teal);}
.num-btn:active{transform:scale(.96);}
.num-btn.del{color:var(--pink);font-size:14px;}
.num-btn.confirm{background:var(--teal);color:#fff;border-color:var(--teal);font-size:14px;}
.num-btn.confirm:hover{background:var(--teal-dark);}
.att-right{width:280px;display:flex;flex-direction:column;gap:14px;}
.att-log-card{background:#fff;border-radius:16px;padding:16px;flex:1;overflow-y:auto;box-shadow:0 2px 12px rgba(0,0,0,.06);}
.att-log-title{font-size:12px;font-weight:500;color:var(--gray);margin-bottom:10px;}
.att-log-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:.5px solid var(--border);font-size:13px;}
.att-log-row:last-child{border-bottom:none;}
.status-badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;}
.sb-ok{background:var(--green-light);color:#0F6E56;}
.sb-late{background:var(--amber-light);color:#854F0B;}
.sb-abs{background:var(--red-light);color:#A32D2D;}
.sb-makeup{background:#eeedfe;color:#534AB7;}
.att-success{display:none;position:fixed;inset:0;background:rgba(46,196,182,.96);z-index:100;flex-direction:column;align-items:center;justify-content:center;gap:20px;}
.att-success.show{display:flex;}
.att-success-icon{font-size:64px;}
.att-success-name{font-size:32px;font-weight:700;color:#fff;}
.att-success-status{font-size:18px;color:rgba(255,255,255,.9);}
.kakao-msg-box{background:var(--kakao);border-radius:12px;padding:16px 20px;max-width:400px;width:90%;}
.kakao-msg-label{font-size:11px;font-weight:500;color:#555;margin-bottom:8px;}
.kakao-msg-text{font-size:14px;color:#3D3D3D;line-height:1.7;white-space:pre-wrap;}
.kakao-copy-btn{margin-top:10px;background:#3D3D3D;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer;width:100%;}
.att-next-btn{background:#fff;color:var(--teal);border:none;border-radius:10px;padding:12px 32px;font-size:15px;font-weight:500;cursor:pointer;}

/* DASHBOARD LAYOUT */
#screen-dashboard{min-height:100vh;flex-direction:column;}
.dash-topbar{background:var(--teal);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:52px;flex-shrink:0;}
.dash-topbar-logo{font-size:16px;font-weight:700;color:#fff;}
.dash-topbar-logo span{color:#FFE066;}
.dash-topbar-logo em{color:var(--pink);font-style:normal;}
.dash-topbar-right{display:flex;align-items:center;gap:10px;}
.topbar-user{font-size:12px;color:rgba(255,255,255,.85);}
.topbar-btn{font-size:12px;padding:5px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.4);color:#fff;background:transparent;cursor:pointer;}
.topbar-btn:hover{background:rgba(255,255,255,.15);}
.dash-layout{display:flex;flex:1;overflow:hidden;height:calc(100vh - 52px);}

/* SIDEBAR */
.sidebar{width:210px;flex-shrink:0;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;}
.sb-section{padding:8px 0;}
.sb-section-label{font-size:10px;color:#bbb;padding:8px 16px 4px;letter-spacing:.06em;text-transform:uppercase;font-weight:500;}
.sb-item{display:flex;align-items:center;gap:8px;padding:9px 16px;font-size:13px;color:#555;cursor:pointer;position:relative;transition:background .15s;}
.sb-item:hover{background:var(--warm);}
.sb-item.active{background:var(--teal-light);color:var(--teal);font-weight:500;border-right:2px solid var(--teal);}
.sb-badge{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:var(--pink);color:#fff;font-size:10px;font-weight:500;padding:1px 6px;border-radius:10px;}
.sb-class-item{display:flex;align-items:center;justify-content:space-between;padding:7px 16px;font-size:12px;color:#666;cursor:pointer;transition:background .15s;}
.sb-class-item:hover{background:var(--warm);}
.sb-class-item.active{color:var(--teal);font-weight:500;background:var(--teal-light);}
.sb-count{font-size:10px;background:#ebe8e3;color:#888;padding:1px 7px;border-radius:10px;}
.sb-count.active{background:var(--teal-light);color:var(--teal);}
.sb-bottom{margin-top:auto;padding:14px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.sb-avatar{width:30px;height:30px;border-radius:50%;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0;}
.sb-user-name{font-size:13px;font-weight:500;}
.sb-user-role{font-size:11px;color:var(--gray);}

/* MAIN */
.main-content{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
.main-header{background:#fff;border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.main-header-left .main-title{font-size:16px;font-weight:500;}
.main-header-left .main-sub{font-size:12px;color:var(--gray);margin-top:2px;}
.header-actions{display:flex;gap:8px;align-items:center;}
.hdr-btn{font-size:12px;padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:#fff;color:#555;cursor:pointer;display:flex;align-items:center;gap:4px;transition:background .15s;}
.hdr-btn:hover{background:var(--warm);}
.hdr-btn.primary{background:var(--teal);color:#fff;border-color:var(--teal);}
.hdr-btn.primary:hover{background:var(--teal-dark);}
.notif-wrap{position:relative;}
.notif-dot{position:absolute;top:-2px;right:-2px;width:8px;height:8px;background:var(--pink);border-radius:50%;border:2px solid #fff;}
.main-body{padding:16px 20px;display:flex;flex-direction:column;gap:14px;}

/* STAT TILES */
.stat-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.stat-tile{background:#fff;border-radius:12px;border:1px solid var(--border);padding:14px;display:flex;align-items:center;gap:10px;}
.stat-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.si-teal{background:var(--green-light);color:#0F6E56;}
.si-amber{background:var(--amber-light);color:#854F0B;}
.si-red{background:var(--red-light);color:#A32D2D;}
.si-purple{background:#eeedfe;color:#534AB7;}
.stat-num{font-size:22px;font-weight:500;}
.stat-lbl{font-size:11px;color:var(--gray);}

/* PANELS */
.two-col{display:grid;grid-template-columns:1fr 300px;gap:12px;align-items:start;}
.right-col{display:flex;flex-direction:column;gap:12px;}
.panel{background:#fff;border-radius:12px;border:1px solid var(--border);overflow:hidden;}
.panel-header{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.panel-title{font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px;}
.panel-action{font-size:12px;color:var(--teal);cursor:pointer;}

/* STUDENT TABLE */
.student-table{width:100%;border-collapse:collapse;font-size:12px;}
.student-table th{font-size:11px;color:var(--gray);font-weight:500;padding:8px 12px;background:#faf9f7;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap;}
.student-table td{padding:9px 12px;border-bottom:.5px solid #f0ede8;vertical-align:middle;}
.student-table tr:last-child td{border-bottom:none;}
.student-table tr:hover td{background:#faf9f7;}
.name-cell{display:flex;align-items:center;gap:8px;}
.t-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0;}
.score-input-wrap{display:flex;align-items:center;gap:4px;}
.fraction-input{width:30px;border:1px solid var(--border);border-radius:5px;padding:3px 4px;font-size:12px;text-align:center;color:var(--charcoal);outline:none;}
.fraction-input:focus{border-color:var(--teal);}
.mini-bar-bg{width:40px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.mini-bar{height:100%;border-radius:2px;}
.attitude-group{display:flex;gap:4px;flex-wrap:wrap;}
.att-btn{padding:3px 7px;border-radius:20px;font-size:11px;border:1px solid var(--border);cursor:pointer;background:#fff;transition:all .15s;opacity:.5;}
.att-btn.selected{opacity:1;font-weight:500;}
.att-btn.att-good.selected{background:var(--green-light);border-color:var(--green);color:#0F6E56;}
.att-btn.att-mid.selected{background:var(--amber-light);border-color:var(--amber);color:#854F0B;}
.att-btn.att-bad.selected{background:var(--pink-light);border-color:var(--pink);color:#993556;}
.hw-group{display:flex;gap:4px;}
.hw-btn{padding:3px 7px;border-radius:20px;font-size:11px;border:1px solid var(--border);cursor:pointer;background:#fff;transition:all .15s;opacity:.5;}
.hw-btn.selected{opacity:1;font-weight:500;}
.hw-btn.hw-done.selected{background:var(--green-light);border-color:var(--green);color:#0F6E56;}
.hw-btn.hw-part.selected{background:var(--amber-light);border-color:var(--amber);color:#854F0B;}
.hw-btn.hw-none.selected{background:var(--red-light);border-color:var(--red);color:#A32D2D;}
.memo-input{width:100%;border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:12px;color:var(--charcoal);outline:none;background:var(--warm);resize:none;}
.memo-input:focus{border-color:var(--teal);background:#fff;}
.save-btn{font-size:11px;padding:4px 10px;border-radius:6px;border:none;background:var(--teal);color:#fff;cursor:pointer;}

/* ALERT / TRACKING */
.alert-panel{background:var(--pink-light);border-radius:12px;border:1px solid #ED93B1;overflow:hidden;}
.alert-panel-hdr{padding:10px 14px;border-bottom:1px solid #F4C0D1;display:flex;align-items:center;justify-content:space-between;}
.alert-title{font-size:13px;font-weight:500;color:#993556;display:flex;align-items:center;gap:5px;}
.alert-count{font-size:10px;background:var(--pink);color:#fff;padding:1px 7px;border-radius:10px;}
.alert-item{padding:9px 14px;border-bottom:.5px solid #F4C0D1;}
.alert-item:last-child{border-bottom:none;}
.alert-item-name{font-size:13px;font-weight:500;}
.alert-item-issue{font-size:11px;color:#993556;margin-top:2px;}

/* MAKEUP */
.makeup-panel{background:var(--yellow-light);border-radius:12px;border:1px solid #D4A81A;overflow:hidden;}
.makeup-panel-hdr{padding:10px 14px;border-bottom:1px solid #E8C840;display:flex;align-items:center;justify-content:space-between;}
.makeup-title{font-size:13px;font-weight:500;color:#854F0B;display:flex;align-items:center;gap:5px;}
.makeup-item{padding:8px 14px;border-bottom:.5px solid #E8C840;}
.makeup-item:last-child{border-bottom:none;}
.makeup-item-name{font-size:13px;font-weight:500;}
.makeup-item-info{font-size:11px;color:#854F0B;margin-top:2px;}
.makeup-assign-badge{display:inline-block;font-size:10px;padding:1px 7px;border-radius:10px;background:var(--amber);color:#fff;margin-top:3px;}
.makeup-complete-btn{font-size:11px;padding:3px 8px;border-radius:6px;border:none;background:#854F0B;color:#fff;cursor:pointer;margin-top:4px;}

/* LESSON */
.lesson-body{padding:12px 14px;display:flex;flex-direction:column;gap:8px;}
.lesson-row{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:#555;}
.lesson-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.lesson-input-row{display:flex;gap:6px;}
.lesson-input{flex:1;border:1px solid var(--border);border-radius:7px;padding:6px 10px;font-size:12px;color:var(--charcoal);background:var(--warm);outline:none;}
.lesson-input:focus{border-color:var(--teal);background:#fff;}
.lesson-add-btn{padding:6px 10px;border-radius:7px;background:var(--teal);color:#fff;border:none;font-size:11px;cursor:pointer;white-space:nowrap;}
.lesson-del{font-size:14px;color:#ccc;cursor:pointer;margin-left:auto;}
.lesson-del:hover{color:var(--red);}
.notice-textarea{width:100%;min-height:70px;border:1px solid var(--border);border-radius:8px;padding:10px;font-size:12px;color:var(--charcoal);background:var(--warm);resize:vertical;outline:none;line-height:1.6;}
.notice-textarea:focus{border-color:var(--teal);background:#fff;}
.notif-item{padding:9px 14px;border-bottom:.5px solid var(--border);display:flex;flex-direction:column;gap:4px;}
.notif-item:last-child{border-bottom:none;}
.notif-row{display:flex;align-items:center;gap:8px;font-size:12px;}
.kakao-copy-small{font-size:10px;padding:2px 8px;border-radius:6px;background:var(--kakao);color:#3D3D3D;border:none;cursor:pointer;margin-left:auto;}

/* SETTINGS */
.settings-body{padding:20px;display:flex;flex-direction:column;gap:16px;max-width:700px;}
.settings-card{background:#fff;border-radius:12px;border:1px solid var(--border);overflow:hidden;}
.settings-card-hdr{padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px;font-weight:500;background:#faf9f7;}
.settings-card-body{padding:16px;display:flex;flex-direction:column;gap:12px;}
.setting-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.setting-label{font-size:12px;color:var(--gray);min-width:80px;}
.setting-input{border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-size:13px;color:var(--charcoal);outline:none;background:var(--warm);}
.setting-input:focus{border-color:var(--teal);background:#fff;}
.setting-save-btn{padding:7px 16px;border-radius:8px;background:var(--teal);color:#fff;border:none;font-size:12px;cursor:pointer;}
.staff-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:.5px solid var(--border);font-size:13px;}
.staff-row:last-child{border-bottom:none;}
.staff-del{font-size:12px;color:var(--red);cursor:pointer;background:none;border:none;}
.add-staff-form{display:flex;gap:8px;flex-wrap:wrap;}
.stu-info-table{width:100%;border-collapse:collapse;font-size:12px;}
.stu-info-table th{padding:7px 10px;background:#faf9f7;border-bottom:1px solid var(--border);font-size:11px;color:var(--gray);text-align:left;white-space:nowrap;}
.stu-info-table td{padding:7px 10px;border-bottom:.5px solid #f0ede8;vertical-align:middle;}
.stu-info-table tr:last-child td{border-bottom:none;}
.si-input{border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:12px;background:var(--warm);outline:none;width:100%;}
.si-input:focus{border-color:var(--teal);}

/* MAKEUP PAGE */
.makeup-page-body{padding:20px;display:flex;flex-direction:column;gap:14px;}
.makeup-add-form{background:#fff;border-radius:12px;border:1px solid var(--border);padding:16px;display:flex;flex-direction:column;gap:12px;}
.makeup-form-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.makeup-form-label{font-size:12px;color:var(--gray);min-width:70px;}
.makeup-select,.makeup-date-input{border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:13px;color:var(--charcoal);background:var(--warm);outline:none;min-width:140px;}
.makeup-select:focus,.makeup-date-input:focus{border-color:var(--teal);}
.makeup-list-table{width:100%;border-collapse:collapse;font-size:12px;background:#fff;border-radius:12px;overflow:hidden;}
.makeup-list-table th{padding:8px 12px;background:#faf9f7;border-bottom:1px solid var(--border);font-size:11px;color:var(--gray);text-align:left;}
.makeup-list-table td{padding:9px 12px;border-bottom:.5px solid var(--border);}
.makeup-list-table tr:last-child td{border-bottom:none;}

/* CALENDAR */
.cal-body{padding:20px;display:flex;flex-direction:column;gap:14px;}
.cal-wrap{background:#fff;border-radius:12px;border:1px solid var(--border);overflow:hidden;}
.cal-header{background:var(--teal);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
.cal-title{font-size:16px;font-weight:500;}
.cal-nav-btn{background:rgba(255,255,255,.2);border:none;color:#fff;width:28px;height:28px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.cal-nav-btn:hover{background:rgba(255,255,255,.3);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);border-left:1px solid var(--border);}
.cal-day-name{padding:8px;text-align:center;font-size:11px;font-weight:500;color:var(--gray);background:#faf9f7;border-bottom:1px solid var(--border);border-right:1px solid var(--border);border-top:1px solid var(--border);}
.cal-day-name:first-child{color:#E24B4A;}
.cal-day-name:last-child{color:#2EC4B6;}
.cal-cell{min-height:80px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:6px;cursor:pointer;transition:background .15s;position:relative;}
.cal-cell:hover{background:var(--teal-light);}
.cal-cell.today{background:#e6faf8;}
.cal-cell.other-month .cal-date{color:#ccc;}
.cal-date{font-size:12px;font-weight:500;margin-bottom:4px;}
.cal-date.sun{color:#E24B4A;}
.cal-date.sat{color:#2EC4B6;}
.cal-date.today-num{background:var(--teal);color:#fff;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;}
.cal-event{font-size:10px;padding:2px 5px;border-radius:4px;margin-bottom:2px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cal-event.type-notice{background:#e1f7f5;color:#085041;}
.cal-event.type-class{background:#eeedfe;color:#534AB7;}
.cal-event.type-holiday{background:var(--red-light);color:var(--red);}
.cal-add-btn{position:absolute;bottom:4px;right:4px;width:18px;height:18px;background:var(--teal);color:#fff;border:none;border-radius:50%;font-size:14px;cursor:pointer;display:none;align-items:center;justify-content:center;line-height:1;}
.cal-cell:hover .cal-add-btn{display:flex;}
.cal-side{background:#fff;border-radius:12px;border:1px solid var(--border);overflow:hidden;min-width:260px;}
.cal-side-hdr{padding:12px 14px;border-bottom:1px solid var(--border);font-size:13px;font-weight:500;}
.cal-event-item{padding:10px 14px;border-bottom:.5px solid var(--border);display:flex;align-items:flex-start;gap:8px;}
.cal-event-item:last-child{border-bottom:none;}
.cal-event-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.cal-event-content{flex:1;}
.cal-event-title{font-size:13px;font-weight:500;}
.cal-event-date{font-size:11px;color:var(--gray);margin-top:1px;}
.cal-event-del{font-size:12px;color:#ccc;cursor:pointer;background:none;border:none;}
.cal-event-del:hover{color:var(--red);}

/* STUDENT INFO VIEW */
.stu-card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;padding:20px;}
.stu-card{background:#fff;border-radius:12px;border:1px solid var(--border);padding:16px;}
.stu-card-top{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.stu-card-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;flex-shrink:0;}
.stu-card-name{font-size:15px;font-weight:500;}
.stu-card-code{font-size:11px;color:var(--gray);}
.stu-card-row{display:flex;gap:6px;margin-bottom:5px;font-size:12px;}
.stu-card-lbl{color:var(--gray);min-width:50px;}
.stu-card-val{color:var(--charcoal);}

/* REPORT */
#report-container{position:fixed;left:-9999px;top:0;width:800px;background:#fff;}
.report-card{width:800px;background:#fff;font-family:'Noto Sans KR',sans-serif;padding:36px 40px;}
.report-header{display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--teal);padding-bottom:14px;margin-bottom:20px;}
.report-logo{font-size:22px;font-weight:700;color:var(--teal);}

.report-meta{text-align:right;font-size:13px;color:var(--gray);line-height:1.7;}
.report-student-name{font-size:26px;font-weight:700;color:var(--charcoal);margin-bottom:4px;}
.report-class-name{font-size:14px;color:var(--gray);margin-bottom:20px;}

.report-item-label{font-size:11px;color:var(--gray);margin-bottom:6px;}
.report-item-value{font-size:18px;font-weight:500;color:var(--charcoal);}
.report-item-sub{font-size:12px;color:var(--gray);margin-top:2px;}
.report-section{margin-bottom:14px;}
.report-section-title{font-size:11px;font-weight:500;color:var(--teal);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em;}
.report-footer{margin-top:24px;padding-top:12px;border-top:1px solid var(--border);font-size:12px;color:var(--gray);display:flex;justify-content:space-between;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}

// ── DISPLAY NAME ──
function displayName(s){
  if(!s) return '';
  return s.nameKo ? `${s.nameKo} (${s.name})` : s.name;
}

// ── CODE FROM PHONE ──
function codeFromPhone(phone){
  const digits=(phone||'').replace(/\D/g,'');
  return digits.length>=4 ? digits.slice(-4) : '';
}

let currentUser=null;
function doLogin(){
  const code=document.getElementById('login-input').value.trim();
  const staff=STORE.get('staff')||DEFAULT_STAFF;
  const user=staff.find(s=>s.code===code);
  if(user){
    currentUser=user;
    document.getElementById('login-error').style.display='none';
    document.getElementById('login-input').value='';
    showScreen('dashboard');
    initDashboard();
  }else{
    document.getElementById('login-error').style.display='block';
  }
}
document.getElementById('login-input').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

  if(id==='attendance') initAttendance();
}

function initAttendance(){
  buildNumpad();updateAttClock();
  setInterval(updateAttClock,1000);
  renderAttLog();
}
function buildNumpad(){
  const np=document.getElementById('numpad');
  const keys=['1','2','3','4','5','6','7','8','9','지우기','0','확인'];
  np.innerHTML=keys.map(k=>{
    let cls='num-btn';
    if(k==='지우기')cls+=' del';
    if(k==='확인')cls+=' confirm';
    return `<div class="${cls}" onclick="numPress('${k}')">${k}</div>`;
  }).join('');
}
function numPress(k){
  if(k==='지우기'){attCode=attCode.slice(0,-1);}
  else if(k==='확인'){checkAttendance();return;}
  else if(attCode.length<4){attCode+=k;}
  updateCodeDisplay();
  if(attCode.length===4)setTimeout(checkAttendance,200);
}
function updateCodeDisplay(){
  const d=document.getElementById('att-code-display');
  const chars=attCode.split('');
  while(chars.length<4)chars.push('_');
  d.textContent=chars.join(' ');
}
function getCurrentClass(){
  const now=new Date();const day=now.getDay();const hour=now.getHours();
  const classes=STORE.get('classes')||DEFAULT_CLASSES;
  return classes.find(c=>c.days.includes(day)&&c.hour===hour)||null;
}
function updateAttClock(){
  const now=new Date();
  const days=['일','월','화','수','목','금','토'];
  const hh=now.getHours().toString().padStart(2,'0');
  const mm=now.getMinutes().toString().padStart(2,'0');
  document.getElementById('att-day-time').textContent=`${days[now.getDay()]}요일 · ${hh}:${mm}`;
  const cls=getCurrentClass();
  document.getElementById('att-class-name').textContent=cls?cls.name:'수업 없음';
  document.getElementById('att-class-badge').textContent=(cls?'📚 '+cls.name:'⏰ 현재 수업 없는 시간');
}
function checkAttendance(){
  if(attCode.length!==4)return;
  const students=STORE.get('students')||DEFAULT_STUDENTS;
  const student=students.find(s=>s.code===attCode);
  if(!student){shakeDisplay();attCode='';updateCodeDisplay();return;}
  const now=new Date();
  const todayKey=toDateKey(now);
  const timeStr=`${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
  const currentCls=getCurrentClass();
  const classes=STORE.get('classes')||DEFAULT_CLASSES;
  const isMakeup=!currentCls||!currentCls.students.includes(student.id);
  let status='출석';
  if(currentCls){
    const nowMin=now.getHours()*60+now.getMinutes();
    if(nowMin-currentCls.hour*60>5)status='지각';
  }
  const att=STORE.get('attendance')||{};
  if(!att[todayKey])att[todayKey]={};
  att[todayKey][student.id]={status,time:timeStr,isMakeup,classId:currentCls?.id||null};
  STORE.set('attendance',att);
  if(isMakeup&&currentCls){
    const makeups=STORE.get('makeups')||[];
    if(!makeups.find(m=>m.studentId===student.id&&m.date===todayKey&&m.status!=='완료')){
      makeups.push({id:'mk_'+Date.now(),studentId:student.id,studentName:displayName(student),
        originalClassId:student.classId,makeupClassId:currentCls.id,date:todayKey,time:timeStr,
        assignedTo:null,status:'대기',memo:'자동등록(출결앱)',autoRegistered:true});
      STORE.set('makeups',makeups);
    }
  }
  const clsName=currentCls?currentCls.name:((classes.find(c=>c.id===student.classId))||{name:'보강'}).name;
  const lateMin=currentCls?Math.max(0,(now.getHours()*60+now.getMinutes())-currentCls.hour*60):0;
  const sName=displayName(student);
  let kakaoMsg=status==='출석'
    ?`${sName} 학생이 ${timeStr}에 링키영어 수업에 출석하였습니다 😊\n오늘 수업: ${clsName}${isMakeup?' (보강)':''}\n— 링키영어 Lisa (010-4838-0124)`
    :`${sName} 학생이 ${timeStr}에 ${lateMin}분 지각 입실하였습니다.\n오늘 수업: ${clsName}${isMakeup?' (보강)':''}\n— 링키영어 Lisa (010-4838-0124)`;
  document.getElementById('att-success-icon').textContent=isMakeup?'📝':(status==='출석'?'✅':'⏰');
  document.getElementById('att-success-name').textContent=sName;
  document.getElementById('att-success-status').textContent=isMakeup?`보강 출석 자동 등록 · ${timeStr}`:`${status} · ${timeStr}`;
  document.getElementById('kakao-msg-text').textContent=kakaoMsg;
  window._kakaoMsg=kakaoMsg;
  document.getElementById('att-success').classList.add('show');
  attCode='';updateCodeDisplay();
  clearTimeout(attTimer);attTimer=setTimeout(resetAttendance,10000);
  renderAttLog();
}
function shakeDisplay(){
  const d=document.getElementById('att-code-display');
  d.style.borderColor='var(--red)';d.style.color='var(--red)';d.textContent='잘못된 코드';
  setTimeout(()=>{d.style.borderColor='var(--teal)';d.style.color='var(--teal)';updateCodeDisplay();},1200);
}
function copyKakaoMsg(){
  navigator.clipboard.writeText(window._kakaoMsg||'').then(()=>{
    const btn=document.querySelector('.kakao-copy-btn');
    btn.textContent='✅ 복사 완료!';setTimeout(()=>btn.textContent='📋 복사하기',2000);
  });
}
function resetAttendance(){document.getElementById('att-success').classList.remove('show');clearTimeout(attTimer);}
function renderAttLog(){
  const att=STORE.get('attendance')||{};const todayKey=toDateKey(new Date());
  const todayAtt=att[todayKey]||{};const students=STORE.get('students')||DEFAULT_STUDENTS;
  const el=document.getElementById('att-log-list');
  const entries=Object.entries(todayAtt);
  if(!entries.length){el.innerHTML='<div class="empty-msg">아직 출석 없음</div>';return;}
  el.innerHTML=entries.map(([sid,data])=>{
    const st=students.find(s=>s.id===sid);
    const badge=data.isMakeup?'sb-makeup':(data.status==='출석'?'sb-ok':data.status==='지각'?'sb-late':'sb-abs');
    const label=data.isMakeup?'보강':data.status;
    return `<div class="att-log-row"><span>${displayName(st)}</span><div style="display:flex;align-items:center;gap:6px;"><span style="font-size:11px;color:#888">${data.time}</span><span class="status-badge ${badge}">${label}</span></div></div>`;
  }).join('');
}

  renderClassSidebar();updateMakeupBadge();switchPage('dashboard');

function renderClassSidebar(){
  const classes=STORE.get('classes')||DEFAULT_CLASSES;
  const students=STORE.get('students')||DEFAULT_STUDENTS;
  const el=document.getElementById('class-list-sidebar');
  if(!selectedClassId)selectedClassId=classes[0]?.id;
  el.innerHTML=classes.map(c=>{
    const cnt=students.filter(s=>s.classId===c.id).length;
    const isActive=c.id===selectedClassId;
    return `<div class="sb-class-item ${isActive?'active':''}" onclick="selectClass('${c.id}')"><span>${c.name}</span><span class="sb-count ${isActive?'active':''}">${cnt}명</span></div>`;
  }).join('');
}
function selectClass(cid){selectedClassId=cid;renderClassSidebar();if(currentPage==='dashboard')renderDashboard();}
function switchPage(page){
  currentPage=page;
  document.querySelectorAll('.sb-item').forEach(el=>el.classList.remove('active'));
  const m=document.getElementById('menu-'+page);if(m)m.classList.add('active');
  if(page==='dashboard')       renderDashboard();
  else if(page==='calendar')   renderCalendar();
  else if(page==='students')   renderStudentsPage();
  else if(page==='attendance-log') renderAttendancePage();
  else if(page==='makeup')     renderMakeupPage();
  else if(page==='settings')   renderSettingsPage();
}

function renderStudentRow(student,attData,rec,classId,dateKey){

  const timeStr=attData?attData.time:'—';
  const correct=rec.correct??'';const total=rec.total??'';
  const scoreVal=(correct!==''&&total!==''&&total>0)?Math.round(correct/total*100):null;
  const scoreColor=scoreVal===null?'var(--charcoal)':scoreVal>=80?'var(--teal)':scoreVal>=70?'var(--amber)':'var(--red)';
  const hw=rec.homework||'';const att=rec.attitude||'';const memo=rec.memo||'';const indivHw=rec.indivHw||'';
  return `<tr id="row-${student.id}">
    <td><div class="name-cell"><div class="t-avatar" style="background:${student.color};color:${student.colorText}">${student.avatar}</div><div><div style="font-weight:500;font-size:12px">${displayName(student)}</div><div style="font-size:10px;color:var(--gray)">${student.code?'#'+student.code:''}</div></div></div></td>
    <td><span class="status-badge ${badgeCls}">${status}${timeStr!=='—'?' '+timeStr:''}</span></td>
    <td><div class="score-input-wrap"><input class="fraction-input" type="number" min="0" id="correct-${student.id}" value="${correct}" placeholder="맞" onchange="calcScore('${student.id}')"><span style="color:var(--gray)">/</span><input class="fraction-input" type="number" min="0" id="total-${student.id}" value="${total}" placeholder="전" onchange="calcScore('${student.id}')"></div><div id="score-result-${student.id}" style="font-size:12px;font-weight:500;color:${scoreColor};margin-top:2px">${scoreVal!==null?scoreVal+'점':''}</div>${scoreVal!==null?`<div class="mini-bar-bg"><div class="mini-bar" style="width:${scoreVal}%;background:${scoreColor}"></div></div>`:''}</td>
    <td><div class="hw-group"><div class="hw-btn hw-done ${hw==='완료'?'selected':''}" onclick="setHw('${student.id}','완료','${classId}','${dateKey}')">완료</div><div class="hw-btn hw-part ${hw==='부분'?'selected':''}" onclick="setHw('${student.id}','부분','${classId}','${dateKey}')">부분</div><div class="hw-btn hw-none ${hw==='미제출'?'selected':''}" onclick="setHw('${student.id}','미제출','${classId}','${dateKey}')">미제출</div></div></td>
    <td><div class="attitude-group"><div class="att-btn att-good ${att==='적극적'?'selected':''}" onclick="setAtt('${student.id}','적극적','${classId}','${dateKey}')">😊</div><div class="att-btn att-mid ${att==='보통'?'selected':''}" onclick="setAtt('${student.id}','보통','${classId}','${dateKey}')">😐</div><div class="att-btn att-bad ${att==='산만함'?'selected':''}" onclick="setAtt('${student.id}','산만함','${classId}','${dateKey}')">😕</div></div></td>
    <td><textarea class="memo-input" id="memo-${student.id}" rows="2" placeholder="메모/피드백...">${memo}</textarea></td>
    <td><textarea class="memo-input" id="indivHw-${student.id}" rows="2" placeholder="개인 과제...">${indivHw}</textarea></td>
    <td style="white-space:nowrap">
      <button class="save-btn" onclick="saveRecord('${student.id}','${classId}','${dateKey}')">저장</button>
      <button class="save-btn" style="background:#FF6B9D;margin-top:4px" onclick="downloadOneReport('${student.id}','${classId}','${dateKey}')">📥</button>
    </td>
  </tr>`;
}

function calcScore(sid){
  const c=parseFloat(document.getElementById('correct-'+sid)?.value)||0;
  const t=parseFloat(document.getElementById('total-'+sid)?.value)||0;
  const el=document.getElementById('score-result-'+sid);if(!el)return;
  if(t>0){const s=Math.round(c/t*100);const color=s>=80?'var(--teal)':s>=70?'var(--amber)':'var(--red)';el.textContent=s+'점';el.style.color=color;}
  else el.textContent='';
}
function setHw(sid,val,classId,dateKey){
  const records=STORE.get('records')||{};
  if(!records[dateKey])records[dateKey]={};if(!records[dateKey][sid])records[dateKey][sid]={};
  records[dateKey][sid].homework=val;STORE.set('records',records);
  document.querySelectorAll(`#row-${sid} .hw-btn`).forEach(b=>b.classList.remove('selected'));
  const map={'완료':'hw-done','부분':'hw-part','미제출':'hw-none'};
  document.querySelector(`#row-${sid} .${map[val]}`)?.classList.add('selected');
}
function setAtt(sid,val,classId,dateKey){
  const records=STORE.get('records')||{};
  if(!records[dateKey])records[dateKey]={};if(!records[dateKey][sid])records[dateKey][sid]={};
  records[dateKey][sid].attitude=val;STORE.set('records',records);
  document.querySelectorAll(`#row-${sid} .att-btn`).forEach(b=>b.classList.remove('selected'));
  const map={'적극적':'att-good','보통':'att-mid','산만함':'att-bad'};
  document.querySelector(`#row-${sid} .${map[val]}`)?.classList.add('selected');
}
function saveRecord(sid,classId,dateKey){
  const records=STORE.get('records')||{};
  if(!records[dateKey])records[dateKey]={};if(!records[dateKey][sid])records[dateKey][sid]={};
  const c=parseFloat(document.getElementById('correct-'+sid)?.value);
  const t=parseFloat(document.getElementById('total-'+sid)?.value);
  const memo=document.getElementById('memo-'+sid)?.value||'';
  if(!isNaN(c))records[dateKey][sid].correct=c;if(!isNaN(t))records[dateKey][sid].total=t;
  records[dateKey][sid].memo=memo;
  const indivHw=document.getElementById('indivHw-'+sid)?.value||'';
  records[dateKey][sid].indivHw=indivHw;
  STORE.set('records',records);

function saveAllRecords(classId,dateKey){
  const students=STORE.get('students')||DEFAULT_STUDENTS;

function addLesson(isHomework,classId,dateKey){

function deleteLesson(idx,classId,dateKey){

function saveNotice(classId,dateKey){

function completeMakeup(mkId){

function updateMakeupBadge(){
  const pending=(STORE.get('makeups')||[]).filter(m=>m.status!=='완료');

// ═══════════════════════════════════════
//  CALENDAR PAGE
// ═══════════════════════════════════════
function renderCalendar(){
  const now=new Date();
  const firstDay=new Date(calYear,calMonth,1);
  const lastDay=new Date(calYear,calMonth+1,0);
  const startDow=firstDay.getDay();
  const monthNames=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const calEvents=STORE.get('cal_events')||[];
  const monthEvents=calEvents.filter(e=>e.date.startsWith(`${calYear}-${String(calMonth+1).padStart(2,'0')}`));
  const todayKey=toDateKey(now);

  let cells=[];
  for(let i=0;i<startDow;i++) cells.push({date:null,otherMonth:true});
  for(let d=1;d<=lastDay.getDate();d++){
    const dateStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    cells.push({date:d,dateStr,events:calEvents.filter(e=>e.date===dateStr)});
  }
  while(cells.length%7!==0) cells.push({date:null,otherMonth:true});

  const typeColor={'notice':'type-notice','class':'type-class','holiday':'type-holiday'};

  document.getElementById('main-content').innerHTML=`
    <div class="main-header">
      <div class="main-header-left"><div class="main-title">📅 공유 달력</div><div class="main-sub">원장·강사 공용 일정</div></div>
      ${currentUser?.role==='원장'?`<div class="header-actions"><button class="hdr-btn primary" onclick="openAddEventModal(null)">+ 일정 추가</button></div>`:''}
    </div>
    <div class="cal-body">
      <div style="display:grid;grid-template-columns:1fr 260px;gap:14px;align-items:start;">
        <div class="cal-wrap">
          <div class="cal-header">
            <button class="cal-nav-btn" onclick="calNav(-1)">‹</button>
            <div class="cal-title">${calYear}년 ${monthNames[calMonth]}</div>
            <button class="cal-nav-btn" onclick="calNav(1)">›</button>
          </div>
          <div class="cal-grid">
            ${['일','월','화','수','목','금','토'].map(d=>`<div class="cal-day-name">${d}</div>`).join('')}
            ${cells.map(cell=>{
              if(!cell.date) return `<div class="cal-cell other-month" style="background:#faf9f7;"></div>`;
              const dow=new Date(calYear,calMonth,cell.date).getDay();
              const isToday=cell.dateStr===todayKey;
              const dateNumHtml=isToday
                ?`<div class="cal-date today-num">${cell.date}</div>`
                :`<div class="cal-date${dow===0?' sun':dow===6?' sat':''}">${cell.date}</div>`;
              return `<div class="cal-cell${isToday?' today':''}" onclick="currentUser?.role==='원장'&&openAddEventModal('${cell.dateStr}')">
                ${dateNumHtml}
                ${(cell.events||[]).slice(0,2).map(e=>`<div class="cal-event ${typeColor[e.type]||'type-notice'}" title="${e.title}">${e.title}</div>`).join('')}
                ${(cell.events||[]).length>2?`<div style="font-size:10px;color:var(--gray)">+${cell.events.length-2}개</div>`:''}
                ${currentUser?.role==='원장'?`<button class="cal-add-btn" onclick="event.stopPropagation();openAddEventModal('${cell.dateStr}')">+</button>`:''}
              </div>`;
            }).join('')}
          </div>
        </div>
        <div>
          <div class="cal-side">
            <div class="cal-side-hdr">📌 ${monthNames[calMonth]} 일정 목록</div>
            ${monthEvents.length?monthEvents.sort((a,b)=>a.date.localeCompare(b.date)).map(e=>`
              <div class="cal-event-item">
                <div class="cal-event-dot" style="background:${e.type==='notice'?'var(--teal)':e.type==='holiday'?'var(--red)':'#534AB7'}"></div>
                <div class="cal-event-content">
                  <div class="cal-event-title">${e.title}</div>
                  <div class="cal-event-date">${e.date}${e.note?' · '+e.note:''}</div>
                </div>
                ${currentUser?.role==='원장'?`<button class="cal-event-del" onclick="deleteCalEvent('${e.id}')">×</button>`:''}
              </div>`).join(''):`<div class="empty-msg">이달 일정 없음</div>`}
          </div>
          <div style="margin-top:12px;background:#fff;border-radius:12px;border:1px solid var(--border);padding:12px 14px;">
            <div style="font-size:12px;font-weight:500;margin-bottom:8px;">범례</div>
            <div style="display:flex;flex-direction:column;gap:5px;font-size:12px;">
              <div style="display:flex;align-items:center;gap:6px;"><div style="width:10px;height:10px;border-radius:3px;background:#e1f7f5;border:1px solid var(--teal)"></div> 공지·행사</div>
              <div style="display:flex;align-items:center;gap:6px;"><div style="width:10px;height:10px;border-radius:3px;background:#eeedfe;border:1px solid #534AB7"></div> 수업 일정</div>
              <div style="display:flex;align-items:center;gap:6px;"><div style="width:10px;height:10px;border-radius:3px;background:var(--red-light);border:1px solid var(--red)"></div> 휴일·휴강</div>
            </div>
          </div>
        </div>
      </div>
    </div>`;
}
function calNav(dir){
  calMonth+=dir;
  if(calMonth<0){calMonth=11;calYear--;}
  if(calMonth>11){calMonth=0;calYear++;}
  renderCalendar();
}
function openAddEventModal(dateStr){
  const today=dateStr||toDateKey(new Date());
  document.getElementById('modal-title').textContent='📅 일정 추가';
  document.getElementById('modal-body').innerHTML=`
    <div class="modal-form-row"><div class="modal-form-label">날짜</div><input class="modal-form-input" id="ev-date" type="date" value="${today}" style="width:100%"></div>
    <div class="modal-form-row"><div class="modal-form-label">제목</div><input class="modal-form-input" id="ev-title" placeholder="일정 제목" style="width:100%"></div>
    <div class="modal-form-row"><div class="modal-form-label">종류</div><select class="modal-form-select" id="ev-type"><option value="notice">공지·행사</option><option value="class">수업 일정</option><option value="holiday">휴일·휴강</option></select></div>
    <div class="modal-form-row"><div class="modal-form-label">메모</div><input class="modal-form-input" id="ev-note" placeholder="추가 메모 (선택)" style="width:100%"></div>`;
  document.getElementById('modal-confirm-btn').onclick=()=>{
    const title=document.getElementById('ev-title').value.trim();
    if(!title){alert('제목을 입력해주세요');return;}
    const events=STORE.get('cal_events')||[];
    events.push({id:'ev_'+Date.now(),date:document.getElementById('ev-date').value,title,type:document.getElementById('ev-type').value,note:document.getElementById('ev-note').value});
    STORE.set('cal_events',events);closeModal();renderCalendar();
  };
  document.getElementById('modal-overlay').classList.add('show');
  setTimeout(()=>document.getElementById('ev-title')?.focus(),100);
}
function deleteCalEvent(id){
  STORE.set('cal_events',(STORE.get('cal_events')||[]).filter(e=>e.id!==id));
  renderCalendar();
}

function addMakeup(){
  const sid=document.getElementById('mk-student').value;const dt=document.getElementById('mk-datetime').value;

  const[datePart,timePart]=dt.split('T');
  const students=STORE.get('students')||DEFAULT_STUDENTS;const st=students.find(s=>s.id===sid);
  const makeups=STORE.get('makeups')||[];
  makeups.push({id:'mk_'+Date.now(),studentId:sid,studentName:displayName(st),date:datePart,time:timePart?.slice(0,5)||'',assignedTo:document.getElementById('mk-staff').value||null,status:'대기',memo:document.getElementById('mk-memo').value,autoRegistered:false,originalClassId:st?.classId});
  STORE.set('makeups',makeups);updateMakeupBadge();renderMakeupPage();
}

// ═══════════════════════════════════════
//  SOLAPI 카카오 알림톡
// ═══════════════════════════════════════
function getSolapiCfg(){ return STORE.get('solapi')||{}; }

async function solapiSend(type){
  const cfg=getSolapiCfg();
  if(!cfg.apiKey||!cfg.apiSecret||!cfg.senderNum){
    setAutoStatus('⚙️ 설정에서 솔라피 API를 먼저 입력해 주세요','#EF9F27');return;
  }
  const phone=window._currentStudentPhone;
  if(!phone||phone.length<10){
    setAutoStatus('⚠️ 학생 정보에 학부모 연락처가 없습니다','#E24B4A');return;
  }
  const tmplId = type==='attend'? cfg.tmplAttend : type==='leave'? cfg.tmplLeave : cfg.tmplLate;
  const msg    = type==='attend'? window._kakaoMsg : window._hawenMsg;
  if(!tmplId){ setAutoStatus('⚙️ 설정에서 템플릿 코드를 입력해 주세요','#EF9F27'); return; }

  setAutoStatus('📨 발송 중...','rgba(255,255,255,0.3)');

  // HMAC-SHA256 서명 생성 (Web Crypto API)
  const date   = new Date().toISOString();
  const salt   = Math.random().toString(36).slice(2,12);
  const signInput = new TextEncoder().encode(date+salt);
  const keyData   = new TextEncoder().encode(cfg.apiSecret);
  const cryptoKey = await crypto.subtle.importKey('raw',keyData,{name:'HMAC',hash:'SHA-256'},false,['sign']);
  const sigBuf    = await crypto.subtle.sign('HMAC',cryptoKey,signInput);
  const signature = Array.from(new Uint8Array(sigBuf)).map(b=>b.toString(16).padStart(2,'0')).join('');

  const to = phone.replace(/^0/,'82');
  const body = {
    message:{
      to, from:cfg.senderNum,
      kakaoOptions:{ pfId:cfg.channelId, templateId:tmplId, variables:{} }
    }
  };

  try{
    const res = await fetch('https://api.solapi.com/messages/v4/send',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':`HMAC-SHA256 apiKey=${cfg.apiKey}, date=${date}, salt=${salt}, signature=${signature}`
      },
      body:JSON.stringify(body)
    });
    const data = await res.json();
    if(res.ok && data.messageId){
      setAutoStatus(`✅ ${type==='attend'?'등원':'하원'} 알림톡 발송 완료!`,'#27AE60');
    } else {
      const errMsg = data.errorMessage||data.message||JSON.stringify(data);
      setAutoStatus(`❌ 발송 실패: ${errMsg}`,'#E24B4A');
      console.error('Solapi error:',data);
    }
  }catch(e){
    setAutoStatus(`❌ 네트워크 오류: ${e.message}`,'#E24B4A');
    console.error(e);
  }
}

function setAutoStatus(msg,bg){
  const el=document.getElementById('att-auto-send-status');
  if(!el)return;
  el.textContent=msg;
  el.style.background=bg||'rgba(0,0,0,0.15)';
  el.style.display='block';
}

function showHawenMsg(){
  const el=document.getElementById('hawen-box');

  if(el)el.style.display='block';

}

function copyKakaoMsg(type){
  const text=(type==='leave'?window._hawenMsg:window._kakaoMsg)||'';
  navigator.clipboard.writeText(text).then(()=>{
    const btns=document.querySelectorAll('.kakao-copy-btn');
    btns.forEach(b=>{if(b.textContent.includes('복사')){b.textContent='✅ 복사됨!';setTimeout(()=>b.textContent='📋 복사',2000);}});

}
